<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <!-- comment statement --> 
     <script>

        //Variable - It is a Box In which we store data ,only one value can store at a time
        //syntax - Variable/keyword VariableName= valuevar
        // 1.var keyword- js creates a variable
        // 2.let keyword- dont allow duplicate value 
        // 3.const keyword- Fixed ,cannot be changed

        var username = 'DG' // required double or single quotes 
        console.log(username)

        var height = 6.1  // no quotes required 
        console.log("the height of DG is ", height)

        var country= 'india'

        var  country= 'bharath'
         // disadvantage of the var keyword is we can use the same variable but the last 
         // or current updated data will be visible 
        console.log(country)
        
         let fruit='apple'
        // in let keyword you can't declare the same variable 
        // but you can trick it like below  without using 'let'
         fruit='mango'
         console.log(fruit)

         const appname='whatsapp'
         // here we can trick the const keyword as the let 
         console.log(appname)


     </script>  

</body>
</html>
