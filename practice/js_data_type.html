          //Data Types - 1
          //1. String - "Anything between the double quotes" or "Text"
          
          var cust_Name='john'
          //build in method/ Function-task
          // typeof(value)
          console.log(typeof(cust_Name))

          //2. Number - +ve,-ve,decimal no
          
          var age =18
          var num= -7.1
          console.log(typeof(age))
